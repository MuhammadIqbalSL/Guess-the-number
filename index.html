<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Number Guessing AI - SMK CBI</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --primary-maroon: #800000;
            --dark-maroon: #4d0000;
            --neon-red: #ff0000;
            --chat-user-bg: #1a1a1a;
            --text-white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ======================== HEADER SECTION ======================== */
        header { 
            padding: 40px 10px 20px 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
            background: linear-gradient(to bottom, var(--bg-color) 30%, transparent);
        }

        .header-main-container { display: flex; align-items: center; position: relative; }

        .header-logo { 
            width: 90px; 
            height: auto; 
            z-index: 1100; 
            margin-right: -15px; 
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.8)); 
        }

        .header-title-box { 
            position: relative; 
            padding: 15px 70px 15px 35px; 
            display: flex; 
            align-items: center; 
            min-height: 75px; 
            border-radius: 20px;
            /* Efek luar tetap glassmorphic tipis */
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Border berputar tetap sama */
        .glow-wrapper { position: absolute; inset: -1px; border-radius: 20px; padding: 2px; overflow: hidden; z-index: 1; }
        .glow-wrapper::before { 
            content: ''; 
            position: absolute; 
            top: -50%; left: -50%; 
            width: 200%; height: 200%; 
            background: conic-gradient(transparent, transparent, var(--neon-red), transparent); 
            animation: rotateGlow 4s linear infinite; 
        }

        /* BAGIAN SOLID: Menutupi background agar teks jelas */
        .box-content-bg { 
            position: absolute; 
            inset: 2px; /* Memberi ruang agar border berputar terlihat */
            background: #141414; /* Warna Solid */
            border-radius: 18px; 
            z-index: 2; 
        }

        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }

        .header-character { 
            position: absolute; 
            height: 160px; 
            right: -30px; 
            bottom: -5px; 
            z-index: 1200; 
            pointer-events: none; 
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.9)); 
        }

        .header-text-group { position: relative; z-index: 10; }
        .header-title { 
            font-size: 1.4rem; 
            font-weight: 900; 
            letter-spacing: 1.5px; 
            text-transform: uppercase; 
            color: var(--text-white);
        }
        .header-subtitle { font-size: 0.8rem; color: rgba(255, 255, 255, 0.6); margin-top: 2px; }

        /* ======================== CHAT AREA ======================== */
        #chat-area { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message { display: flex; align-items: flex-end; gap: 12px; max-width: 85%; animation: fadeInUp 0.4s ease forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; flex-shrink: 0; }
        .ai .avatar { background: linear-gradient(135deg, var(--primary-maroon), #220000); }
        .user .avatar { background: #e0e0e0; }
        .avatar svg { width: 20px; fill: white; }
        .user .avatar svg { fill: #333; }
        .bubble { padding: 12px 18px; border-radius: 18px; font-size: 0.95rem; line-height: 1.5; position: relative; }
        .ai .bubble { background-color: var(--primary-maroon); color: white; border-bottom-left-radius: 4px; }
        .user .bubble { background-color: var(--chat-user-bg); color: white; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.08); }

        /* BUTTONS STYLING */
        .btn-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; transition: all 0.4s ease; }
        .choice-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .choice-btn:hover { background: var(--primary-maroon); border-color: var(--neon-red); }
        .btn-container.hide { opacity: 0; transform: translateY(10px); pointer-events: none; }

        /* ======================== INPUT AREA ======================== */
        .input-section { padding: 20px; position: sticky; bottom: 0; display: flex; gap: 12px; background: linear-gradient(to top, var(--bg-color) 70%, transparent); z-index: 100; }
        .input-wrapper { flex: 1; }
        input { width: 100%; padding: 16px 25px; background: var(--primary-maroon); border: 2px solid transparent; border-radius: 50px; color: white; outline: none; font-size: 16px; transition: var(--transition); }
        input:focus { border-color: var(--neon-red); background: var(--dark-maroon); }
        input:disabled { opacity: 0.5; cursor: not-allowed; }
        button#send-btn { background: var(--primary-maroon); border: none; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: var(--transition); }
        button#send-btn:hover:not(:disabled) { background: var(--neon-red); transform: scale(1.05); }

        @media (max-width: 480px) {
            header { padding-top: 30px; }
            .header-logo { width: 70px; }
            .header-title-box { padding: 12px 60px 12px 25px; min-height: 60px; }
            .header-title { font-size: 1.1rem; }
            .header-character { height: 130px; right: -20px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-main-container">
            <img src="smk_cbi.png" alt="Logo SMK CBI" class="header-logo">
            <div class="header-title-box">
                <div class="glow-wrapper"></div>
                <div class="box-content-bg"></div>
                <img src="ranger-character.png" alt="Character" class="header-character">
                <div class="header-text-group">
                    <div class="header-title">NUM GUESS AI</div>
                    <div class="header-subtitle">SMK CBI | TP 2025/2026</div>
                </div>
            </div>
        </div>
    </header>

    <main id="chat-area"></main>

    <div class="input-section">
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Menunggu pilihan..." disabled autocomplete="off">
        </div>
        <button id="send-btn" disabled>
            <svg viewBox="0 0 24 24" width="24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        let gameState = "CHOOSE_MODE"; 
        let targetNumber = null;
        let threshold = null;
        let maxLives = 0;
        let currentLives = 0;
        let isInfinite = false;
        let guessedNumbers = [];

        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const aiIcon = `<svg viewBox="0 0 24 24"><path d="M20,18c1.1,0,2-0.9,2-2V6c0-1.1-0.9-2-2-2H4C2.9,4,2,4.9,2,6v10c0,1.1,0.9,2,2,2H0v2h24v-2H20z M4,6h16v10H4V6z M7,9h10v2H7V9z M7,12h7v2H7V12z"></path></svg>`;
        const userIcon = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>`;

        function scrollToBottom() { window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' }); }

        function addMessage(sender, text, withButtons = false) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            
            let btnHtml = '';
            if (withButtons) {
                btnHtml = `
                    <div class="btn-container" id="current-btns">
                        <button class="choice-btn" onclick="selectMode('normal')">NORMAL</button>
                        <button class="choice-btn" onclick="selectMode('custom')">CUSTOM</button>
                        <button class="choice-btn" onclick="selectMode('infinite')">INFINITE</button>
                    </div>
                `;
            }

            msgDiv.innerHTML = `
                <div class="avatar">${sender === 'ai' ? aiIcon : userIcon}</div>
                <div class="bubble">
                    ${text}
                    ${btnHtml}
                </div>
            `;
            chatArea.appendChild(msgDiv);
            setTimeout(scrollToBottom, 50);
        }

        function removeButtons() {
            const btnContainer = document.getElementById('current-btns');
            if (btnContainer) {
                btnContainer.classList.add('hide');
                setTimeout(() => btnContainer.remove(), 400);
            }
        }

        function initGame() {
            gameState = "CHOOSE_MODE";
            userInput.disabled = true;
            sendBtn.disabled = true;
            userInput.value = "";
            userInput.placeholder = "Pilih mode permainan...";
            addMessage("ai", "Sistem aktif. Tentukan konfigurasi batas nyawa yang akan digunakan:");
            setTimeout(() => addMessage("ai", "Silakan pilih salah satu opsi di bawah:", true), 400);
        }

        function selectMode(mode) {
            removeButtons();
            if (mode === 'normal') {
                isInfinite = false;
                gameState = "SET_THRESHOLD";
                addMessage("user", "MODE NORMAL");
                askThreshold();
            } else if (mode === 'custom') {
                isInfinite = false;
                gameState = "SET_CUSTOM_LIVES";
                addMessage("user", "MODE CUSTOM");
                setTimeout(() => {
                    addMessage("ai", "Tentukan **JUMLAH NYAWA** yang diinginkan:");
                    enableInput("...input jumlah nyawa");
                }, 500);
            } else if (mode === 'infinite') {
                isInfinite = true;
                gameState = "SET_THRESHOLD";
                addMessage("user", "MODE INFINITE");
                askThreshold();
            }
        }

        function enableInput(placeholder) {
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.type = "number";
            userInput.placeholder = placeholder;
            userInput.focus();
        }

        function askThreshold() {
            setTimeout(() => {
                addMessage("ai", "Tentukan **BATAS ANGKA MAKSIMAL** (1 - N):");
                enableInput("...input angka maksimal");
            }, 500);
        }

        function handleGame() {
            const input = userInput.value.trim();
            if (!input) return;

            if (gameState === "SET_CUSTOM_LIVES") {
                const lives = parseInt(input);
                if (isNaN(lives) || lives <= 0) return;
                maxLives = lives;
                currentLives = lives;
                addMessage("user", `Nyawa ditetapkan: ${lives}`);
                userInput.value = "";
                gameState = "SET_THRESHOLD";
                askThreshold();

            } else if (gameState === "SET_THRESHOLD") {
                const num = parseInt(input);
                if (isNaN(num) || num <= 1) return;
                threshold = num;
                targetNumber = Math.floor(Math.random() * threshold) + 1;
                addMessage("user", `Batas Maksimal: ${threshold}`);

                if (!isInfinite && maxLives === 0) {
                    maxLives = Math.floor((threshold - 10) / 20) * 2 + 3;
                    if (threshold < 10) maxLives = 3;
                    currentLives = maxLives;
                }

                gameState = "PLAYING";
                userInput.value = "";
                setTimeout(() => {
                    const lifeStatus = isInfinite ? "TAK TERBATAS" : `${currentLives} KALI`;
                    addMessage("ai", `Konfigurasi tersimpan.<br>Batas: **1 - ${threshold}**<br>Kesempatan: **${lifeStatus}**.<br>Sistem menunggu input tebakan.`);
                    userInput.placeholder = "...masukkan tebakan";
                }, 500);

            } else if (gameState === "PLAYING") {
                const val = parseInt(input);
                if (isNaN(val)) return;
                addMessage("user", val);
                userInput.value = "";

                setTimeout(() => {
                    if (val > threshold || val < 1) {
                        addMessage("ai", `**ERROR:** Input ${val} di luar jangkauan (1-${threshold}).`);
                        return;
                    }
                    if (guessedNumbers.includes(val)) {
                        addMessage("ai", `**PERINGATAN:** Angka ${val} sudah pernah dimasukkan.`);
                        return;
                    }

                    guessedNumbers.push(val);

                    if (val === targetNumber) {
                        addMessage("ai", `**BERHASIL:** Angka **${targetNumber}** terdeteksi.`);
                        setTimeout(() => { addMessage("ai", "Menghapus data sesi..."); resetAll(); }, 2000);
                    } else {
                        let hint = val < targetNumber ? "terlalu **RENDAH**" : "terlalu **TINGGI**";
                        if (isInfinite) {
                            addMessage("ai", `Input ${hint}. (Infinite)`);
                        } else {
                            currentLives--;
                            if (currentLives > 0) {
                                addMessage("ai", `Input ${hint}.<br>Sisa: **${currentLives}**`);
                            } else {
                                addMessage("ai", `**GAGAL:** Kesempatan habis. Target: **${targetNumber}**.`);
                                setTimeout(() => { addMessage("ai", "Sistem memuat ulang..."); resetAll(); }, 2000);
                            }
                        }
                    }
                }, 500);
            }
        }

        function resetAll() {
            guessedNumbers = [];
            maxLives = 0;
            currentLives = 0;
            initGame();
        }

        window.onload = initGame;
        sendBtn.addEventListener('click', handleGame);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleGame(); });
    </script>
</body>
</html>
