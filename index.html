<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number AI</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --primary-maroon: #800000;
            --dark-maroon: #4d0000;
            --neon-red: #ff0000;
            --chat-user-bg: #1a1a1a;
            --text-white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ======================== HEADER ======================== */
        header { padding: 20px; display: flex; justify-content: center; z-index: 10; }
        .header-container {
            position: relative;
            background: rgba(0, 0, 0, 0.8);
            padding: 15px 35px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .header-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--neon-red), transparent);
            animation: rotate 4s linear infinite;
            z-index: -1;
        }
        .header-container::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0f0f0f;
            border-radius: 13px;
            z-index: -1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        header h1 { font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px var(--neon-red); }

        /* ======================== CHAT AREA ======================== */
        #chat-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }
        .message {
            display: flex;
            align-items: flex-end;
            gap: 10px;
            max-width: 85%;
            animation: fadeInUp 0.4s ease forwards;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .avatar {
            width: 35px; height: 35px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .ai .avatar { background: linear-gradient(135deg, var(--primary-maroon), #330000); }
        .user .avatar { background: #eee; }
        .avatar svg { width: 18px; fill: white; }
        .user .avatar svg { fill: #333; }

        .bubble { padding: 12px 16px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; }
        .ai .bubble { background: var(--primary-maroon); color: white; border-bottom-left-radius: 2px; }
        .user .bubble { background: var(--chat-user-bg); color: white; border-bottom-right-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }

        /* ======================== INPUT AREA ======================== */
        .input-section {
            padding: 20px;
            background: transparent; /* Menghilangkan background abu-abu */
            display: flex;
            gap: 10px;
            position: relative;
        }

        .input-wrapper { flex: 1; position: relative; }

        input {
            width: 100%;
            padding: 15px 25px;
            background: var(--primary-maroon);
            border: 2px solid transparent;
            border-radius: 50px;
            color: white;
            outline: none;
            transition: var(--transition);
            font-size: 1rem;
        }

        /* Mengatur Placeholder */
        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            transition: var(--transition);
        }

        /* Saat Fokus */
        input:focus {
            background: var(--dark-maroon);
            border-color: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        /* Warna placeholder saat fokus (fade in ke putih) */
        input:focus::placeholder {
            color: rgba(255, 255, 255, 1);
        }

        /* Saat mulai mengetik (teks placeholder menghilang perlahan) */
        input:not(:placeholder-shown)::placeholder {
            opacity: 0;
        }

        button#send-btn {
            background: var(--primary-maroon);
            border: none;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button#send-btn:hover {
            background: var(--neon-red);
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--neon-red);
        }

        button#send-btn svg { width: 22px; fill: white; transform: rotate(45deg); margin-left: -3px; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Guess The Number AI</h1>
        </div>
    </header>

    <main id="chat-area"></main>

    <div class="input-section">
        <div class="input-wrapper">
            <input type="number" id="user-input" placeholder="...type your guess" autocomplete="off">
        </div>
        <button id="send-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        let targetNumber = null;
        let threshold = null;
        let isWaitingForThreshold = true;

        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const aiIcon = `<svg viewBox="0 0 24 24"><path d="M20,18c1.1,0,2-0.9,2-2V6c0-1.1-0.9-2-2-2H4C2.9,4,2,4.9,2,6v10c0,1.1,0.9,2,2,2H0v2h24v-2H20z M4,6h16v10H4V6z M7,9h10v2H7V9z M7,12h7v2H7V12z"></path></svg>`;
        const userIcon = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>`;

        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            const icon = sender === 'ai' ? aiIcon : userIcon;
            msgDiv.innerHTML = `<div class="avatar">${icon}</div><div class="bubble">${text}</div>`;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function askThreshold() {
            isWaitingForThreshold = true;
            userInput.placeholder = "...set max number";
            addMessage("ai", "Halo. Sebelum kita mulai, tentukan dulu batas angkanya. Ingin menebak dari 1 sampai berapa? (Contoh: 10 atau 20)");
        }

        function handleLogic() {
            const val = parseInt(userInput.value);
            if (isNaN(val) || val <= 0) return;

            if (isWaitingForThreshold) {
                threshold = val;
                targetNumber = Math.floor(Math.random() * threshold) + 1;
                addMessage("user", `Batas: ${val}`);
                userInput.value = "";
                
                setTimeout(() => {
                    addMessage("ai", `Baik. Aku sudah memilih angka antara **1 sampai ${threshold}**. Silakan tebak!`);
                    isWaitingForThreshold = false;
                    userInput.placeholder = "...type your guess";
                }, 600);
            } else {
                addMessage("user", val);
                userInput.value = "";

                setTimeout(() => {
                    if (val === targetNumber) {
                        addMessage("ai", `🎯 **TEPAT!** Angkanya memang **${targetNumber}**. Kamu menang!`);
                        setTimeout(() => {
                            askThreshold(); // Kembali ke awal
                        }, 1500);
                    } else if (val < targetNumber) {
                        addMessage("ai", "Terlalu **kecil**. Coba lagi.");
                    } else {
                        addMessage("ai", "Terlalu **besar**. Coba lagi.");
                    }
                }, 600);
            }
        }

        window.onload = askThreshold;
        sendBtn.addEventListener('click', handleLogic);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleLogic(); });
    </script>
</body>
</html>
