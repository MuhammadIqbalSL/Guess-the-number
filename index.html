<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guess The Number AI - SMK CBI</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --primary-maroon: #800000;
            --dark-maroon: #4d0000;
            --neon-red: #ff0000;
            --chat-user-bg: #1a1a1a;
            --text-white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ======================== 
           HEADER RE-DESIGNED 
           ======================== */
        header {
            padding: 40px 10px 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-color);
        }

        .header-main-container {
            display: flex;
            align-items: center;
            position: relative;
        }

        /* Logo SMK CBI - Di luar box sebelah kiri */
        .header-logo {
            width: 90px;
            height: auto;
            z-index: 50;
            margin-right: -10px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* Container Utama Judul */
        .header-title-box {
            position: relative;
            background: #0f0f0f;
            padding: 15px 70px 15px 35px; /* Spasi kanan besar untuk Ranger */
            border-radius: 15px;
            display: flex;
            align-items: center;
            min-height: 70px;
            /* Box ini tidak boleh overflow hidden agar Ranger bisa keluar */
        }

        /* Elemen khusus untuk Animasi Border Glow */
        .border-glow {
            position: absolute;
            inset: -2px; /* Sedikit lebih besar dari box */
            border-radius: 17px;
            background: conic-gradient(transparent, transparent, var(--neon-red), transparent);
            animation: rotateGlow 4s linear infinite;
            z-index: -1;
        }

        /* Penutup background agar tengah box tetap gelap */
        .box-inner-bg {
            position: absolute;
            inset: 2px;
            background: #0f0f0f;
            border-radius: 14px;
            z-index: 0;
        }

        @keyframes rotateGlow { 
            100% { transform: rotate(360deg); } 
        }

        /* Karakter Ranger - Lebih Besar & Di Atas Semuanya */
        .header-character {
            position: absolute;
            height: 160px; /* Ukuran diperbesar */
            width: auto;
            right: -30px;
            bottom: -5px;
            z-index: 100; /* Paling atas */
            pointer-events: none;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.9));
        }

        /* Teks Judul */
        .header-text-group {
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-size: 1.5rem; /* Ukuran lebih besar */
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--neon-red);
            white-space: nowrap;
            color: #fff;
        }

        .header-subtitle {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* ======================== 
           CHAT AREA 
           ======================== */
        #chat-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 85%;
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }

        .ai .avatar { background: linear-gradient(135deg, var(--primary-maroon), #220000); }
        .user .avatar { background: #e0e0e0; }
        .avatar svg { width: 20px; fill: white; }
        .user .avatar svg { fill: #333; }

        .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .ai .bubble { background-color: var(--primary-maroon); color: white; border-bottom-left-radius: 4px; }
        .user .bubble { background-color: var(--chat-user-bg); color: white; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.08); }

        /* ======================== 
           INPUT AREA 
           ======================== */
        .input-section {
            padding: 20px;
            position: sticky;
            bottom: 0;
            width: 100%;
            display: flex;
            gap: 12px;
            align-items: center;
            background: linear-gradient(to top, var(--bg-color) 70%, transparent);
            z-index: 100;
        }

        .input-wrapper { flex: 1; }

        input {
            width: 100%;
            padding: 16px 25px;
            background: var(--primary-maroon);
            border: 2px solid transparent;
            border-radius: 50px;
            color: white;
            outline: none;
            transition: var(--transition);
            font-size: 16px; 
        }

        input:focus {
            background: var(--dark-maroon);
            border-color: var(--neon-red);
        }

        button#send-btn {
            background: var(--primary-maroon);
            border: none;
            width: 55px; height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: var(--transition);
        }

        button#send-btn:hover { background: var(--neon-red); transform: scale(1.05); }
        button#send-btn svg { width: 24px; fill: white; transform: rotate(45deg); margin-left: -3px; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            header { padding-top: 50px; }
            .header-logo { width: 70px; margin-right: -5px; }
            .header-title-box { padding: 10px 55px 10px 25px; min-height: 60px; }
            .header-title { font-size: 1.1rem; }
            .header-subtitle { font-size: 0.65rem; }
            .header-character { height: 130px; right: -20px; bottom: -5px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-main-container">
            <img src="smk_cbi.png" alt="Logo SMK CBI" class="header-logo">
            
            <div class="header-title-box">
                <div class="border-glow"></div>
                <div class="box-inner-bg"></div>
                
                <img src="ranger-character.png" alt="Ranger" class="header-character">
                
                <div class="header-text-group">
                    <div class="header-title">Guess The Number AI</div>
                    <div class="header-subtitle">SMK CBI | TP 2025/2026</div>
                </div>
            </div>
        </div>
    </header>

    <main id="chat-area"></main>

    <div class="input-section">
        <div class="input-wrapper">
            <input type="number" id="user-input" placeholder="...set max number" autocomplete="off">
        </div>
        <button id="send-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        let targetNumber = null;
        let threshold = null;
        let isWaitingForThreshold = true;

        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const aiIcon = `<svg viewBox="0 0 24 24"><path d="M20,18c1.1,0,2-0.9,2-2V6c0-1.1-0.9-2-2-2H4C2.9,4,2,4.9,2,6v10c0,1.1,0.9,2,2,2H0v2h24v-2H20z M4,6h16v10H4V6z M7,9h10v2H7V9z M7,12h7v2H7V12z"></path></svg>`;
        const userIcon = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>`;

        function scrollToBottom() {
            window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        }

        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            const icon = sender === 'ai' ? aiIcon : userIcon;
            msgDiv.innerHTML = `<div class="avatar">${icon}</div><div class="bubble">${text}</div>`;
            chatArea.appendChild(msgDiv);
            setTimeout(scrollToBottom, 50);
        }

        function askThreshold() {
            isWaitingForThreshold = true;
            userInput.placeholder = "...set max number";
            addMessage("ai", "Sistem diinisialisasi. Tentukan batas angka maksimal (contoh: 10, 50, atau 100).");
        }

        function handleGame() {
            const val = parseInt(userInput.value);
            if (isNaN(val) || val <= 0) return;

            if (isWaitingForThreshold) {
                threshold = val;
                targetNumber = Math.floor(Math.random() * threshold) + 1;
                addMessage("user", `Batas maksimal: ${val}`);
                userInput.value = "";
                setTimeout(() => {
                    addMessage("ai", `Target ditetapkan (1-${threshold}). Silakan tebak angkanya!`);
                    isWaitingForThreshold = false;
                    userInput.placeholder = "...type your guess";
                }, 600);
            } else {
                addMessage("user", val);
                userInput.value = "";
                setTimeout(() => {
                    if (val === targetNumber) {
                        addMessage("ai", `🎯 **TEPAT!** Angkanya adalah **${targetNumber}**. Kamu menang!`);
                        setTimeout(() => { addMessage("ai", "Me-reset sistem..."); setTimeout(askThreshold, 1000); }, 1500);
                    } else if (val < targetNumber) {
                        addMessage("ai", "Input terlalu **rendah**.");
                    } else {
                        addMessage("ai", "Input terlalu **tinggi**.");
                    }
                }, 600);
            }
        }

        window.onload = askThreshold;
        sendBtn.addEventListener('click', handleGame);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleGame(); });
        userInput.addEventListener('focus', () => { setTimeout(scrollToBottom, 300); });
    </script>
</body>
</html>
