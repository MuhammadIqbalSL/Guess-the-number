<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guess The Number AI - SMK CBI</title>
    <style>
        /* ======================== 
           VARIABLES & CORE 
           ======================== */
        :root {
            --bg-color: #0f0f0f;
            --primary-maroon: #800000;
            --dark-maroon: #4d0000;
            --neon-red: #ff0000;
            --chat-user-bg: #1a1a1a;
            --text-white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --header-border-size: 3px; /* Border dipertebal */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ======================== 
           HEADER CUSTOMIZED 
           ======================== */
        header {
            padding: 30px 15px 15px 15px; /* Tambah padding atas agar ranger tidak terpotong */
            display: flex;
            justify-content: center;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-color);
        }

        .header-main-container {
            display: flex;
            align-items: center;
            position: relative;
            /* Memberikan ruang ekstra ke kiri untuk logo */
            padding-left: 20px; 
        }

        /* Logo SMK CBI (Posisi Lebih ke Kiri) */
        .header-logo {
            width: 85px; /* Ukuran disesuaikan */
            height: auto;
            position: relative;
            z-index: 20;
            margin-right: -15px; /* Membuat logo agak sedikit overlap ke box */
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        /* Container Judul (Box dengan Border Lebar) */
        .header-title-box {
            position: relative;
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 60px 12px 30px; /* Padding kanan lebar untuk ranger */
            border-radius: 15px;
            backdrop-filter: blur(10px);
            /* Menghilangkan overflow agar ranger bisa keluar dari box */
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Karakter Ranger (Lebih Besar & Di Atas Border) */
        .header-character {
            position: absolute;
            height: 140px; /* Ukuran diperbesar */
            width: auto;
            bottom: -5px; /* Menempel di bawah */
            right: -25px; /* Menggantung di kanan */
            z-index: 30; /* Pastikan di atas border glow */
            pointer-events: none;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        /* Efek Glow Berputar */
        .header-title-box::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--neon-red), transparent);
            animation: rotateGlow 4s linear infinite;
            z-index: -1;
        }

        .header-title-box::after {
            content: '';
            position: absolute;
            inset: var(--header-border-size);
            background: #0f0f0f;
            border-radius: calc(15px - var(--header-border-size));
            z-index: -1;
        }

        @keyframes rotateGlow { 100% { transform: rotate(360deg); } }

        /* Teks Judul */
        .header-text-group {
            position: relative;
            z-index: 10;
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-red);
            white-space: nowrap;
        }

        .header-subtitle {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.5px;
            margin-top: 3px;
        }

        /* ======================== 
           CHAT & INPUT AREA (Sama Seperti Sebelumnya)
           ======================== */
        #chat-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 85%;
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }

        .ai .avatar { background: linear-gradient(135deg, var(--primary-maroon), #220000); }
        .user .avatar { background: #e0e0e0; }
        .avatar svg { width: 20px; fill: white; }
        .user .avatar svg { fill: #333; }

        .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .ai .bubble { background-color: var(--primary-maroon); color: white; border-bottom-left-radius: 4px; }
        .user .bubble { background-color: var(--chat-user-bg); color: white; border-bottom-right-radius: 4px; border: 1px solid rgba(255,255,255,0.08); }

        .input-section {
            padding: 20px;
            position: sticky;
            bottom: 0;
            width: 100%;
            display: flex;
            gap: 12px;
            align-items: center;
            background: linear-gradient(to top, var(--bg-color) 70%, transparent);
            z-index: 100;
        }

        .input-wrapper { flex: 1; position: relative; }

        input {
            width: 100%;
            padding: 16px 25px;
            background: var(--primary-maroon);
            border: 2px solid transparent;
            border-radius: 50px;
            color: white;
            outline: none;
            transition: var(--transition);
            font-size: 16px; 
        }

        input:focus {
            background: var(--dark-maroon);
            border-color: var(--neon-red);
        }

        button#send-btn {
            background: var(--primary-maroon);
            border: none;
            width: 55px; height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: var(--transition);
        }

        button#send-btn:hover { background: var(--neon-red); transform: scale(1.05); }
        button#send-btn svg { width: 24px; fill: white; transform: rotate(45deg); margin-left: -3px; }

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        /* Responsive Mobile */
        @media (max-width: 480px) {
            header { padding-top: 40px; }
            .header-logo { width: 65px; }
            .header-character { height: 110px; right: -15px; }
            .header-title-box { padding: 8px 45px 8px 25px; }
            .header-title { font-size: 0.95rem; }
            .header-subtitle { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-main-container">
            <img src="smk_cbi.png" alt="SMK CBI Logo" class="header-logo">
            
            <div class="header-title-box">
                <img src="ranger-character.png" alt="Red Ranger" class="header-character">
                
                <div class="header-text-group">
                    <div class="header-title">Guess The Number AI</div>
                    <div class="header-subtitle">SMK CBI | TP 2025/2026</div>
                </div>
            </div>
        </div>
    </header>

    <main id="chat-area"></main>

    <div class="input-section">
        <div class="input-wrapper">
            <input type="number" id="user-input" placeholder="...set max number" autocomplete="off">
        </div>
        <button id="send-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        let targetNumber = null;
        let threshold = null;
        let isWaitingForThreshold = true;

        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const aiIcon = `<svg viewBox="0 0 24 24"><path d="M20,18c1.1,0,2-0.9,2-2V6c0-1.1-0.9-2-2-2H4C2.9,4,2,4.9,2,6v10c0,1.1,0.9,2,2,2H0v2h24v-2H20z M4,6h16v10H4V6z M7,9h10v2H7V9z M7,12h7v2H7V12z"></path></svg>`;
        const userIcon = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>`;

        function scrollToBottom() {
            window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'smooth' });
        }

        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            const icon = sender === 'ai' ? aiIcon : userIcon;
            msgDiv.innerHTML = `<div class="avatar">${icon}</div><div class="bubble">${text}</div>`;
            chatArea.appendChild(msgDiv);
            setTimeout(scrollToBottom, 50);
        }

        function askThreshold() {
            isWaitingForThreshold = true;
            userInput.placeholder = "...set max number";
            addMessage("ai", "Sistem diinisialisasi. Tentukan batas angka maksimal (contoh: 10, 50, atau 100).");
        }

        function handleGame() {
            const val = parseInt(userInput.value);
            if (isNaN(val) || val <= 0) return;

            if (isWaitingForThreshold) {
                threshold = val;
                targetNumber = Math.floor(Math.random() * threshold) + 1;
                addMessage("user", `Batas maksimal: ${val}`);
                userInput.value = "";
                setTimeout(() => {
                    addMessage("ai", `Target ditetapkan (1-${threshold}). Silakan tebak angkanya!`);
                    isWaitingForThreshold = false;
                    userInput.placeholder = "...type your guess";
                }, 600);
            } else {
                addMessage("user", val);
                userInput.value = "";
                setTimeout(() => {
                    if (val === targetNumber) {
                        addMessage("ai", `🎯 **TEPAT!** Angkanya adalah **${targetNumber}**. Kamu menang!`);
                        setTimeout(() => { addMessage("ai", "Me-reset sistem..."); setTimeout(askThreshold, 1000); }, 1500);
                    } else if (val < targetNumber) {
                        addMessage("ai", "Input terlalu **rendah**.");
                    } else {
                        addMessage("ai", "Input terlalu **tinggi**.");
                    }
                }, 600);
            }
        }

        window.onload = askThreshold;
        sendBtn.addEventListener('click', handleGame);
        userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleGame(); });
        userInput.addEventListener('focus', () => { setTimeout(scrollToBottom, 300); });
    </script>
</body>
</html>
