<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guess The Number AI</title>
    <style>
        /* ======================== 
           VARIABLES & CORE 
           ======================== */
        :root {
            --bg-color: #0f0f0f;
            --primary-maroon: #800000;
            --dark-maroon: #4d0000;
            --neon-red: #ff0000;
            --chat-user-bg: #1a1a1a;
            --text-white: #ffffff;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-white);
            /* dVmin/dVh untuk handle address bar mobile */
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* ======================== 
           HEADER (Sticky)
           ======================== */
        header {
            padding: 15px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--bg-color);
        }

        .header-container {
            position: relative;
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }

        .header-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, var(--neon-red), transparent);
            animation: rotate 4s linear infinite;
            z-index: -1;
        }

        .header-container::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #0f0f0f;
            border-radius: 13px;
            z-index: -1;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        header h1 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px var(--neon-red);
            white-space: nowrap;
        }

        /* ======================== 
           CHAT AREA 
           ======================== */
        #chat-area {
            flex: 1;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            /* Biarkan body yang mengontrol scroll utama agar smooth di mobile */
        }

        .message {
            display: flex;
            align-items: flex-end;
            gap: 12px;
            max-width: 85%;
            animation: fadeInUp 0.4s ease forwards;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.ai { align-self: flex-start; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }

        .avatar {
            width: 38px; height: 38px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .ai .avatar { background: linear-gradient(135deg, var(--primary-maroon), #220000); }
        .user .avatar { background: #e0e0e0; }
        .avatar svg { width: 20px; fill: white; }
        .user .avatar svg { fill: #333; }

        .bubble {
            padding: 12px 18px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            position: relative;
        }

        .ai .bubble {
            background-color: var(--primary-maroon);
            color: white;
            border-bottom-left-radius: 4px;
        }

        .user .bubble {
            background-color: var(--chat-user-bg);
            color: white;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* ======================== 
           INPUT AREA (Sticky Bottom)
           ======================== */
        .input-section {
            padding: 20px;
            position: sticky;
            bottom: 0;
            width: 100%;
            display: flex;
            gap: 12px;
            align-items: center;
            background: linear-gradient(to top, var(--bg-color) 70%, transparent);
            z-index: 100;
        }

        .input-wrapper { flex: 1; position: relative; }

        input {
            width: 100%;
            padding: 16px 25px;
            background: var(--primary-maroon);
            border: 2px solid transparent;
            border-radius: 50px;
            color: white;
            outline: none;
            transition: var(--transition);
            font-size: 16px; /* Mencegah auto-zoom di iOS */
        }

        /* Placeholder Logic */
        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
            transition: opacity 0.3s ease, color 0.3s ease;
        }

        input:focus {
            background: var(--dark-maroon);
            border-color: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        /* Placeholder menjadi putih saat fokus */
        input:focus::placeholder {
            color: rgba(255, 255, 255, 1);
        }

        /* Placeholder menghilang saat mulai mengetik */
        input:not(:placeholder-shown)::placeholder {
            opacity: 0;
        }

        button#send-btn {
            background: var(--primary-maroon);
            border: none;
            width: 55px; height: 55px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        button#send-btn:hover {
            background: var(--neon-red);
            transform: scale(1.05);
            box-shadow: 0 0 20px var(--neon-red);
        }

        button#send-btn svg {
            width: 24px;
            fill: white;
            transform: rotate(45deg);
            margin-left: -3px;
        }

        /* Hapus arrow pada input number */
        input::-webkit-outer-spin-button, 
        input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        @media (max-width: 480px) {
            .message { max-width: 90%; }
            .input-section { padding: 15px; }
            header h1 { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <h1>Guess The Number AI</h1>
        </div>
    </header>

    <main id="chat-area">
        </main>

    <div class="input-section">
        <div class="input-wrapper">
            <input type="number" id="user-input" placeholder="...set max number" autocomplete="off">
        </div>
        <button id="send-btn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
    </div>

    <script>
        /* ======================== 
           GAME ENGINE 
           ======================== */
        let targetNumber = null;
        let threshold = null;
        let isWaitingForThreshold = true;

        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        const aiIcon = `<svg viewBox="0 0 24 24"><path d="M20,18c1.1,0,2-0.9,2-2V6c0-1.1-0.9-2-2-2H4C2.9,4,2,4.9,2,6v10c0,1.1,0.9,2,2,2H0v2h24v-2H20z M4,6h16v10H4V6z M7,9h10v2H7V9z M7,12h7v2H7V12z"></path></svg>`;
        const userIcon = `<svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"></path></svg>`;

        // Auto-scroll function
        function scrollToBottom() {
            window.scrollTo({
                top: document.documentElement.scrollHeight,
                behavior: 'smooth'
            });
        }

        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender);
            const icon = sender === 'ai' ? aiIcon : userIcon;
            msgDiv.innerHTML = `<div class="avatar">${icon}</div><div class="bubble">${text}</div>`;
            chatArea.appendChild(msgDiv);
            
            // Jeda sedikit agar elemen ter-render sebelum scroll
            setTimeout(scrollToBottom, 50);
        }

        function askThreshold() {
            isWaitingForThreshold = true;
            userInput.placeholder = "...set max number";
            addMessage("ai", "Sistem diinisialisasi. Tentukan batas angka maksimal untuk permainan ini (contoh: 10, 50, atau 100).");
        }

        function handleGame() {
            const val = parseInt(userInput.value);
            
            if (isNaN(val) || val <= 0) return;

            if (isWaitingForThreshold) {
                // Proses Penentuan Threshold
                threshold = val;
                targetNumber = Math.floor(Math.random() * threshold) + 1;
                addMessage("user", `Batas maksimal: ${val}`);
                userInput.value = "";
                
                setTimeout(() => {
                    addMessage("ai", `Target ditetapkan. Aku sudah memilih angka antara **1 sampai ${threshold}**. Silakan tebak!`);
                    isWaitingForThreshold = false;
                    userInput.placeholder = "...type your guess";
                    scrollToBottom();
                }, 600);
            } else {
                // Proses Tebak Angka
                addMessage("user", val);
                userInput.value = "";

                setTimeout(() => {
                    if (val === targetNumber) {
                        addMessage("ai", `🎯 **TEPAT!** Angka yang aku simpan adalah **${targetNumber}**. Kamu menang!`);
                        setTimeout(() => {
                            addMessage("ai", "Me-reset sistem...");
                            setTimeout(askThreshold, 1000);
                        }, 1500);
                    } else if (val < targetNumber) {
                        addMessage("ai", "Input terlalu **rendah**. Coba angka lebih tinggi.");
                    } else {
                        addMessage("ai", "Input terlalu **tinggi**. Coba angka lebih rendah.");
                    }
                    scrollToBottom();
                }, 600);
            }
        }

        // Jalankan saat pertama kali load
        window.onload = () => {
            askThreshold();
        };

        // Event Listeners
        sendBtn.addEventListener('click', handleGame);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleGame();
        });

        // Scroll ke bawah saat input difokuskan (penting untuk mobile keyboard)
        userInput.addEventListener('focus', () => {
            setTimeout(scrollToBottom, 300);
        });
    </script>
</body>
</html>
